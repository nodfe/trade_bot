services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: tradebot-db
    environment:
      POSTGRES_USER: tradebot
      POSTGRES_PASSWORD: tradebot
      POSTGRES_DB: tradebot
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradebot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradebot-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradebot-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://tradebot:tradebot@db:5432/tradebot
      - DATABASE_SYNC_URL=postgresql://tradebot:tradebot@db:5432/tradebot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradebot-celery-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://tradebot:tradebot@db:5432/tradebot
      - DATABASE_SYNC_URL=postgresql://tradebot:tradebot@db:5432/tradebot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A celery_app worker --loglevel=info --concurrency=2

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradebot-celery-beat
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://tradebot:tradebot@db:5432/tradebot
      - DATABASE_SYNC_URL=postgresql://tradebot:tradebot@db:5432/tradebot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A celery_app beat --loglevel=info

  admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradebot-admin
    ports:
      - "5001:5001"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000

volumes:
  pgdata:
  redisdata:
