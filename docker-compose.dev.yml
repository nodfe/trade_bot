services:
  backend:
    volumes:
      - ./backend:/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload

  celery-worker:
    volumes:
      - ./backend:/app
    command: uv run celery -A celery_app worker --loglevel=info --concurrency=2

  celery-beat:
    volumes:
      - ./backend:/app
    command: uv run celery -A celery_app beat --loglevel=info

  admin:
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @quant/admin dev -- --hostname 0.0.0.0 --port 5001"
