services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - APP_ENV=development
      - APP_DEBUG=true

  celery-worker:
    command: celery -A celery_app worker --loglevel=debug --concurrency=2

  celery-beat:
    command: celery -A celery_app beat --loglevel=debug

  admin:
    command: pnpm dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
